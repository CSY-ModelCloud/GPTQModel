name: Clean CI

defaults:
  run:
    shell: bash -le {0}

on:
  schedule:
    - cron: '0 16 * * 0' # UTC+8 00:00 Monday
  repository_dispatch:
  workflow_dispatch:
    inputs:
      docker-image:
        description: 'delete all dockers'
        required: false
        type: boolean
      uv:
        description: 'clean uv cache'
        required: false
        type: boolean
      pip:
        description: 'clean pip cache'
        required: false
        type: boolean
      dist:
        description: 'clean logs/artificats'
        required: false
        type: boolean


concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:130-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    steps:
      - name: Print uv cache
        run: |
          uv cache dir

      - name: Clean uv cache
        if:  ${{ github.event.inputs.uv == 'true' }}
        run: |
          uv cache clean

      - name: Print pip cache
        run: |
          pip cache dir || true

      - name: Clean pip cache
        if:  ${{ github.event.inputs.pip == 'true' }}
        run: |
          pip cache purge || true

      - name: Print dist
        run: |
          find /opt/dist -mindepth 1 -maxdepth 1 -type d | wc -l

      - name: Clean dist
        if:  ${{ github.event.inputs.dist == 'true' }}
        run: |
          rm -rf /opt/dist/*

  system:
    needs:
      - docker # run after docker, so make sure all images can be deleted
    runs-on: [ self-hosted, xeon5 ]
    steps:
      - name: Print docker images
        run: |
          docker images

      - name: Clean docker images
        if:  ${{ github.event.inputs.docker-image == 'true' }}
        run: |
          docker system prune -a --force
